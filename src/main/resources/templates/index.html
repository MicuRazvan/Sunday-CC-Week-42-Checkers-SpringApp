<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Spring Checkers</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }

        #start-btn:hover {
            background-color: #45a049;
        }

        #game-container {
            display: none;
            text-align: center;
        }

        #status {
            font-size: 1.5rem;
            margin-bottom: 15px;
            font-weight: bold;
            color: #333;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
            border: 4px solid #333;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .cell {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .white { background-color: #f0d9b5; }
        .black { background-color: #b58863; }

        .piece {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.6), 0 2px 4px rgba(0,0,0,0.3);
        }

        .red { background-color: #d32f2f; }
        .blue { background-color: #1976d2; }

        .selected {
            outline: 3px solid #ffeb3b;
            z-index: 10;
        }

        /* Winner Popup Modal */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .modal h2 {
            margin-top: 0;
            font-size: 2rem;
            color: #333;
        }

        .modal button {
            padding: 10px 25px;
            font-size: 1rem;
            background-color: #1976d2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<button id="start-btn" onclick="startGame()">Start Game</button>

<div id="game-container">
    <div id="status">Red's Turn</div>
    <div class="board" id="board"></div>
</div>

<!-- Winner Popup -->
<div id="modal-overlay">
    <div class="modal">
        <h2 id="winner-text">Player Wins!</h2>
        <button onclick="resetGame()">Play Again</button>
    </div>
</div>

<script>
    let selectedCell = null;

    function startGame() {
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        resetGame();
    }

    function resetGame() {
        document.getElementById('modal-overlay').style.display = 'none';
        selectedCell = null;
        fetch('/api/reset', { method: 'POST' })
            .then(res => res.json())
            .then(state => updateUI(state));
    }

    function createBoardHTML() {
        const boardContainer = document.getElementById('board');
        boardContainer.innerHTML = '';
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const cell = document.createElement('div');
                cell.className = `cell ${(r + c) % 2 === 0 ? 'white' : 'black'}`;
                cell.dataset.row = r;
                cell.dataset.col = c;
                cell.addEventListener('click', () => onCellClick(r, c, cell));
                boardContainer.appendChild(cell);
            }
        }
    }

    function onCellClick(r, c, cellElement) {
        const hasPiece = cellElement.querySelector('.piece');

        if (selectedCell === null) {
            if (hasPiece) {
                selectedCell = { r, c, element: cellElement };
                cellElement.classList.add('selected');
            }
        } else {
            if (selectedCell.r === r && selectedCell.c === c) {
                // Deselect if clicked same cell
                cellElement.classList.remove('selected');
                selectedCell = null;
            } else if (hasPiece) {
                // Switch selection to another of your pieces
                selectedCell.element.classList.remove('selected');
                selectedCell = { r, c, element: cellElement };
                cellElement.classList.add('selected');
            } else {
                // Send move payload to backend
                const moveData = {
                    fromRow: selectedCell.r,
                    fromCol: selectedCell.c,
                    toRow: r,
                    toCol: c
                };

                fetch('/api/move', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(moveData)
                })
                .then(res => res.json())
                .then(state => {
                    selectedCell.element.classList.remove('selected');
                    selectedCell = null;
                    updateUI(state);
                });
            }
        }
    }

    function updateUI(gameState) {
        const cells = document.querySelectorAll('.cell');
        cells.forEach(cell => {
            const r = parseInt(cell.dataset.row);
            const c = parseInt(cell.dataset.col);
            const pieceType = gameState.board[r][c];

            cell.innerHTML = ''; // Clear previous piece representation
            if (pieceType) {
                const piece = document.createElement('div');
                piece.className = `piece ${pieceType}`;
                cell.appendChild(piece);
            }
        });

        // Update Turn Label
        const turnText = gameState.turn.charAt(0).toUpperCase() + gameState.turn.slice(1);
        document.getElementById('status').innerText = `${turnText}'s Turn`;

        // Check for Winner
        if (gameState.winner) {
            const winnerText = gameState.winner.toUpperCase() + " WINS!";
            document.getElementById('winner-text').innerText = winnerText;
            document.getElementById('modal-overlay').style.display = 'flex';
        }
    }

    // Initialize empty board layout structure on load
    window.onload = createBoardHTML;
</script>
</body>
</html>
